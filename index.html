<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PedsCalc · Saeed Al Rassadi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;color:#1a1a1a;min-height:100vh}
#app{min-height:100vh}
.splash{min-height:100vh;background:linear-gradient(160deg,#0a3d6b 0%,#185FA5 55%,#1D9E75 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;position:relative;overflow:hidden}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,0.08);pointer-events:none}
.logo{width:80px;height:80px;background:rgba(255,255,255,0.15);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;border:1px solid rgba(255,255,255,0.2)}
.splash h1{font-size:30px;font-weight:700;color:#fff;margin-bottom:6px}
.splash p{color:rgba(255,255,255,0.65);font-size:14px;margin-bottom:4px;line-height:1.7}
.splash-btn{background:#fff;color:#185FA5;border:none;border-radius:14px;padding:14px 44px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:2rem}
.splash-ver{position:absolute;bottom:1.5rem;display:flex;flex-direction:column;align-items:center;gap:4px}
.disc-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f4f8;padding:1.5rem}
.disc-card{background:#fff;border-radius:20px;padding:2rem;max-width:440px;width:100%}
.disc-icon{width:52px;height:52px;background:#E6F1FB;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem}
.disc-card h2{font-size:18px;font-weight:700;margin-bottom:.75rem}
.disc-card p{font-size:13px;color:#666;line-height:1.75;margin-bottom:.75rem}
.disc-btn{width:100%;padding:13px;font-size:15px;font-weight:700;background:#185FA5;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit;margin-top:.5rem}
.wrap{max-width:580px;margin:0 auto;padding:0 1rem}
.pull{margin-top:-12px}
.card{background:#fff;border-radius:16px;padding:1rem 1.25rem;margin-bottom:.85rem}
.card-label{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.65rem}
label{display:block;font-size:12px;color:#888;margin-bottom:5px}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid #e5e5e5;border-radius:10px;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none}
input:focus,select:focus,textarea:focus{border-color:#185FA5}
textarea{resize:vertical}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#eee;border-radius:12px;overflow:hidden;margin-bottom:.85rem}
.stat{background:#fff;padding:.65rem .5rem;text-align:center}
.stat-n{font-size:18px;font-weight:700;color:#185FA5}
.stat-l{font-size:10px;color:#aaa;font-weight:500}
.search-wrap{position:relative}
.search-wrap input{padding-left:36px;background:#f7f9fc}
.s-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none}
.cat-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:.65rem}
.cpill{font-size:11px;padding:4px 11px;border-radius:20px;cursor:pointer;border:1px solid #e5e5e5;background:#fff;color:#888;font-family:inherit;font-weight:500}
.drug-list{background:#fff;border-radius:16px;overflow:hidden;margin-bottom:.85rem}
.drow{padding:.75rem 1rem;cursor:pointer;border-bottom:1px solid #f5f5f5;display:flex;align-items:center;justify-content:space-between;gap:10px}
.drow:last-child{border-bottom:none}
.drow:hover{background:#f7f9fc}
.dname{font-size:14px;font-weight:600;color:#1a1a1a}
.dsub{font-size:11px;color:#aaa;margin-top:2px}
.pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.fbstrip{background:#fff;border-radius:16px;padding:.85rem 1rem;text-align:center;margin-bottom:.85rem}
.icell{background:#f5f5f5;border-radius:10px;padding:8px 12px}
.icell-l{font-size:10px;color:#aaa;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.icell-v{font-size:13px;font-weight:600;color:#1a1a1a}
.metric{border-radius:12px;padding:.85rem 1rem;background:#f5f5f5}
.metric-l{font-size:11px;color:#888;margin-bottom:4px;font-weight:500}
.metric-v{font-size:26px;font-weight:700;line-height:1;color:#1a1a1a}
.metric-u{font-size:13px;font-weight:400;color:#aaa;margin-left:3px}
.mblue{background:linear-gradient(135deg,#E6F1FB,#d0e8f7)}
.mblue .metric-l{color:#185FA5}
.mblue .metric-v{color:#0C447C}
.mblue .metric-u{color:#378ADD}
.warn{background:#fff8e6;border-left:3px solid #f0c040;border-radius:0 10px 10px 0;padding:.65rem 1rem;font-size:13px;color:#7a5500;margin-bottom:.75rem;line-height:1.6}
.err{background:#fff0f0;border-left:3px solid #e24b4b;border-radius:0 10px 10px 0;padding:.65rem 1rem;font-size:13px;color:#8b1a1a;margin-bottom:.75rem}
.ftrace{background:#f5f5f5;border-radius:10px;padding:.6rem 1rem;font-size:12px;color:#aaa;margin-bottom:.75rem;font-family:monospace}
.ref-block{border-bottom:1px solid #f0f0f0;padding:8px 0}
.ref-block:last-child{border-bottom:none}
.ref-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.ref-k{font-size:12px;font-weight:700;color:#185FA5}
.ref-dose{font-size:13px;font-weight:600;color:#1a1a1a}
.ref-note{font-size:12px;color:#888;line-height:1.5}
.ref-btn{font-size:12px;color:#bbb;background:none;border:none;cursor:pointer;font-family:inherit;padding:0}
.footer{font-size:11px;color:#ccc;text-align:center;padding:.75rem 0 1.5rem}
.remark{background:#EBF5FF;border-left:3px solid #185FA5;border-radius:0 12px 12px 0;padding:.85rem 1rem;margin-bottom:.75rem}
.remark-lbl{font-size:10px;font-weight:700;color:#185FA5;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.remark-text{font-size:15px;font-weight:600;color:#0C447C;line-height:1.7}
.route-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.85rem}
.rtab{font-size:12px;font-weight:600;padding:7px 16px;border-radius:20px;cursor:pointer;border:1.5px solid #e5e5e5;background:#fff;color:#888;font-family:inherit}
.rtab.active{background:#185FA5;color:#fff;border-color:#185FA5}
.fb-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.85rem}
.fbtb{padding:10px 8px;border-radius:12px;border:1.5px solid #e5e5e5;background:#fff;font-size:12px;font-weight:600;color:#888;cursor:pointer;font-family:inherit;text-align:center;line-height:1.4}
.fbtb.active{border-color:#185FA5;background:#E6F1FB;color:#0C447C}
.send-btn{width:100%;padding:13px;font-size:15px;font-weight:700;background:#185FA5;color:#fff;border:none;border-radius:12px;cursor:pointer;font-family:inherit;margin-bottom:.85rem}
@media(prefers-color-scheme:dark){
  body,#app{background:#111;color:#e5e5e5}
  h1,h2{color:#e5e5e5}
  .card,.drug-list,.disc-card,.fbstrip,.stat{background:#1c1c1e}
  .stats{background:#2a2a2a}
  input,select,textarea{background:#2a2a2a;border-color:#3a3a3a;color:#e5e5e5}
  input::placeholder,textarea::placeholder{color:#666}
  .drow{border-color:#2a2a2a;background:#1c1c1e}
  .drow:hover{background:#252525}
  .dname{color:#e5e5e5}
  .dsub{color:#666}
  .metric,.icell,.ftrace{background:#2a2a2a}
  .icell-v,.metric-v{color:#e5e5e5}
  .search-wrap input{background:#2a2a2a}
  .cpill{background:#1c1c1e;border-color:#3a3a3a;color:#888}
  .ref-block{border-color:#2a2a2a}
  .ref-dose{color:#e5e5e5}
  .ref-note{color:#666}
  .card-label,.stat-l{color:#555}
  label{color:#666}
  .disc-card p{color:#aaa}
  .disc-card h2,.dname{color:#e5e5e5}
  .disc-icon{background:#1a2a3a}
  .fbstrip{background:#1c1c1e}
  .footer{color:#444}
  .warn{background:#2a2200;border-color:#7a6000;color:#e5c040}
  .err{background:#2a0000;border-color:#7a2020;color:#f09090}
  .ftrace{color:#555}
  .ref-btn{color:#555}
  .remark{background:#1a2a3a;border-color:#378ADD}
  .remark-lbl{color:#64B5F6}
  .remark-text{color:#90CAF9}
  .rtab{background:#1c1c1e;border-color:#3a3a3a;color:#888}
  .rtab.active{background:#185FA5;color:#fff;border-color:#185FA5}
  .fbtb{background:#1c1c1e;border-color:#3a3a3a;color:#888}
  .fbtb.active{background:#1a2a3a;border-color:#185FA5;color:#90CAF9}
}
</style>
</head>

function getCR(name,route){return(CONC_BY_ROUTE[name]&&CONC_BY_ROUTE[name][route])||null;}
function getWt(){return parseFloat(state.wt)||0;}

function getRoutes(rs){
  if(rs.toLowerCase().indexOf('nebuliz')>=0) return['Nebulized'];
  var out=[];
  if(/\bPO\b/.test(rs)) out.push('PO');
  if(/\bIV\b/.test(rs)) out.push('IV');
  if(/\bIM\b/.test(rs)) out.push('IM');
  if(/\bSC\b/.test(rs)) out.push('SC');
  if(/\bPR\b/.test(rs)) out.push('PR');
  if(/buccal/i.test(rs)) out.push('Buccal');
  if(/\bIN\b/.test(rs)) out.push('IN');
  return out.length?out:[rs.split('(')[0].trim()];
}
function routeLabel(r){var m={PO:'Oral (PO)',IV:'IV',IM:'IM',SC:'SC',PR:'Rectal (PR)',Nebulized:'Nebulized',Buccal:'Buccal',IN:'Intranasal (IN)'};return m[r]||r;}
function routeText(r){var m={PO:'by mouth',IV:'intravenously',IM:'intramuscularly',SC:'subcutaneously',PR:'rectally',Nebulized:'by nebulisation',Buccal:'buccally',IN:'intranasally'};return m[r]||r;}
function defaultRoute(rs){var r=getRoutes(rs);for(var i=0;i<r.length;i++){if(r[i]==='PO') return 'PO';}return r[0];}

}

function resultHTML(){
  var d=state.drug;
  if(!d) return '';
  var wt=getWt();
  var conc=parseFloat(state.conc)||d.conc;
  var isSingle=d.lo===d.hi;
  var c=CC[d.cat]||{};
  var tMin=wt*d.lo, tMax=wt*d.hi;
  var cMin=Math.min(tMin,d.max), cMax=Math.min(tMax,d.max);
  var vMin=conc>0?cMin/conc:0, vMax=conc>0?cMax/conc:0;
  var isCapped=tMin>d.max||tMax>d.max;
  var doseStr=isSingle?(''+d.lo):(d.lo+'-'+d.hi);
  var totStr=isSingle?cMin.toFixed(1):(cMin.toFixed(1)+'-'+cMax.toFixed(1));
  var volStr=isSingle?vMin.toFixed(2):(vMin.toFixed(2)+'-'+vMax.toFixed(2));
  var routes=getRoutes(d.route);
  var tabs='';
  if(routes.length>1){
    tabs='<div class="route-tabs">';
    for(var i=0;i<routes.length;i++){
      var act=state.selectedRoute===routes[i]?' active':'';
      tabs+='<button class="rtab'+act+' route-tab-btn" data-route="'+routes[i]+'">'+routeLabel(routes[i])+'</button>';
    }
    tabs+='</div>';
  }
  var refsHtml='';
  if(state.showRefs){
    var rkeys=Object.keys(d.refs);
    for(var ri=0;ri<rkeys.length;ri++){
      var rk=rkeys[ri];
      var rv=d.refs[rk];
      refsHtml+='<div class="ref-block">'+
        '<div class="ref-top"><span class="ref-k">'+rk+'</span><span class="ref-dose">'+rv.dose+'</span></div>'+
        '<div class="ref-note">'+rv.note+'</div>'+
        '</div>';
    }
    refsHtml='<div style="margin-top:.85rem">'+refsHtml+'</div>';
  }
  var calcHTML='';
  if(wt>0){
    if(parseFloat(state.conc)===0){
      calcHTML='<div class="metric" style="margin-bottom:.75rem">'+
        '<div class="metric-l">Calculated dose</div>'+
        '<div class="metric-v">'+totStr+'<span class="metric-u">mg</span></div></div>'+
        '<div class="warn">Suppository - select the nearest available size to '+totStr+' mg. Do not cut suppositories.</div>';
    } else {
      var capWarn=isCapped?('<div class="err">Max dose cap applied - dose exceeds '+d.max+' mg.</div>'):'';
      calcHTML=capWarn+
        '<div class="g2" style="margin-bottom:.75rem">'+
        '<div class="metric"><div class="metric-l">Total dose</div><div class="metric-v">'+totStr+'<span class="metric-u">mg</span></div></div>'+
        '<div class="metric mblue"><div class="metric-l">Volume to give</div><div class="metric-v">'+volStr+'<span class="metric-u">mL</span></div></div>'+
        '</div>'+
        '<div class="ftrace">'+wt.toFixed(1)+' x '+doseStr+' / '+conc+(isCapped?' capped at '+d.max+' mg':'')+'</div>'+
        '<div class="remark"><div class="remark-lbl">Administration instruction</div>'+
        '<div class="remark-text">Give <strong>'+volStr+' mL</strong> ('+totStr+' mg) <strong>'+d.freq+'</strong> - '+routeText(state.selectedRoute)+'</div></div>';
    }
  } else {
    calcHTML='<div class="metric" style="text-align:center;color:#bbb;font-size:14px;padding:1.25rem;margin-bottom:.75rem">Enter patient weight above to calculate</div>';
  }
  var noteHTML=d.note?('<div class="warn">'+d.note+'</div>'):'';
  var genHTML=d.generic?('<div style="font-size:12px;color:#aaa">'+d.generic+'</div>'):'';
  return '<div>'+
  '<div style="padding:.75rem 1rem .25rem;background:#f0f4f8"><div class="wrap">'+
  '<button class="ref-btn" id="btn-back" style="color:#185FA5;font-size:13px;font-weight:600;margin-bottom:.5rem">&#8592; Back</button>'+
  '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">'+
  '<div><div class="dname" style="font-size:19px;font-weight:700">'+d.name+'</div>'+genHTML+'</div>'+
  '<span class="pill" style="background:'+c.bg+';color:'+c.tx+';margin-top:4px">'+d.cat+'</span>'+
  '</div></div></div>'+
  '<div class="wrap pull">'+
  '<div class="card"><div class="g2">'+
  '<div class="icell"><div class="icell-l">Dose</div><div class="icell-v">'+doseStr+' mg/kg</div></div>'+
  '<div class="icell"><div class="icell-l">Max single dose</div><div class="icell-v">'+d.max+' mg</div></div>'+
  '<div class="icell" style="margin-top:8px"><div class="icell-l">Route</div><div class="icell-v">'+d.route+'</div></div>'+
  '<div class="icell" style="margin-top:8px"><div class="icell-l">Frequency</div><div class="icell-v">'+d.freq+'</div></div>'+
  '</div></div>'+
  tabs+
  '<div class="g2" style="margin-bottom:.85rem">'+
  '<div><label>Patient weight (kg)</label>'+
  '<input type="number" id="inp-wt-res" value="'+state.wt+'" placeholder="e.g. 12.5" min="0.1" step="0.1"/>'+
  (state.age?('<div style="font-size:11px;color:#aaa;margin-top:3px">'+state.age+'</div>'):'')+'</div>'+
  '<div><label>Concentration (mg/mL)</label>'+
  '<input type="number" id="inp-conc" value="'+(state.conc||d.conc)+'" min="0.01" step="0.01"/>'+
  '<div style="font-size:10px;color:#bbb;margin-top:3px">'+(state.concLabel||d.concL)+'</div></div>'+
  '</div>'+
  calcHTML+noteHTML+
  '<div class="card">'+
  '<button class="ref-btn" id="btn-refs">'+(state.showRefs?'Hide references':'View source references (BNFC - Harriet Lane - Taketomo - UpToDate)')+'</button>'+
  refsHtml+'</div>'+
  '<div class="fbstrip">'+
  '<p style="font-size:12px;color:#aaa;margin-bottom:5px">Found an error or have a suggestion?</p>'+
  '<button id="btn-go-feedback-res" style="font-size:13px;color:#185FA5;font-weight:600;background:none;border:none;cursor:pointer;font-family:inherit;padding:0">Send feedback &#8594;</button>'+
  '</div>'+
  '<div class="footer">&#169; Saeed Al Rassadi - Version 1.2</div>'+
  '</div></div>';
}

function feedbackHTML(){
  if(state.fbSent){
    return '<div>'+
    '<div style="padding:.75rem 1rem .25rem"><div class="wrap">'+
    '<button class="ref-btn" id="btn-back-fb" style="color:#185FA5;font-size:13px;font-weight:600">&#8592; Back</button>'+

    '<div class="wrap" style="text-align:center;padding:3rem 1rem">'+

    '<p style="font-size:14px;color:#888;line-height:1.7;margin-bottom:1.5rem">Your feedback has been sent to Saeed Al Rassadi.<br>It helps make PedsCalc better for everyone.</p>'+

    {key:'suggestion',icon:'&#128161;',label:'Suggestion',sub:'General feedback'}

    }
    drugSel='<div style="margin-bottom:.75rem"><label>Which drug?</label><select id="fb-drug">'+opts+'</select></div>';
  }
  var ph=state.fbType==='error'?'e.g. Amoxicillin dose should be different...':state.fbType==='missing'?'e.g. Please add Flucloxacillin...':'e.g. Would love a neonatal dosing warning...';
  var lbl=state.fbType==='error'?'What is wrong / what should it be?':state.fbType==='missing'?'Which drug and why?':'Your suggestion';

  '<div style="padding:.75rem 1rem .5rem"><div class="wrap">'+

  '</div></div>'+

  '<div class="card">'+

  '<div class="footer">&#169; Saeed Al Rassadi - Version 1.2</div>'+

function bindEvents(){
  var s=state.screen;
  var el;
  if(s==='splash'){
    el=document.getElementById('btn-start');
    if(el) el.addEventListener('click',function(){state.screen='disclaimer';render();});
  } else if(s==='disclaimer'){
    el=document.getElementById('btn-disc');
    if(el) el.addEventListener('click',function(){state.screen='home';render();});
  } else if(s==='home'){
    el=document.getElementById('inp-wt');
    if(el) el.addEventListener('input',function(e){state.wt=e.target.value;});
    el=document.getElementById('inp-age');
    if(el) el.addEventListener('input',function(e){state.age=e.target.value;});
    el=document.getElementById('inp-search');
    if(el) el.addEventListener('input',function(e){state.search=e.target.value;render();});
    el=document.getElementById('inp-cat');
    if(el) el.addEventListener('change',function(e){state.cat=e.target.value;render();});
    var pills=document.querySelectorAll('.cat-pill-btn');
    for(var i=0;i<pills.length;i++){
      (function(btn){
        btn.addEventListener('click',function(){
          state.cat=state.cat===btn.dataset.cat?'All':btn.dataset.cat;render();
        });
      })(pills[i]);
    }
    var rows=document.querySelectorAll('.drow');
    for(var j=0;j<rows.length;j++){
      (function(row){
        row.addEventListener('click',function(){
          var wtEl=document.getElementById('inp-wt');
          var ageEl=document.getElementById('inp-age');
          if(wtEl) state.wt=wtEl.value||state.wt;
          if(ageEl) state.age=ageEl.value||state.age;
          var d=DRUGS[parseInt(row.dataset.idx)];
          var dr=defaultRoute(d.route);
          var cr=getCR(d.name,dr);
          state.drug=d;state.selectedRoute=dr;
          state.conc=String(cr?cr.c:d.conc);
          state.concLabel=cr?cr.l:'';
          state.showRefs=false;state.screen='result';render();
        });
      })(rows[j]);
    }
    el=document.getElementById('btn-go-feedback');
    if(el) el.addEventListener('click',function(){state.fbType='error';state.fbDrug='';state.fbMsg='';state.fbSent=false;state.screen='feedback';render();});
  } else if(s==='result'){
    el=document.getElementById('btn-back');
    if(el) el.addEventListener('click',function(){state.screen='home';render();});
    el=document.getElementById('inp-wt-res');
    if(el) el.addEventListener('input',function(e){state.wt=e.target.value;render();});
    el=document.getElementById('inp-conc');
    if(el) el.addEventListener('input',function(e){state.conc=e.target.value;render();});
    el=document.getElementById('btn-refs');
    if(el) el.addEventListener('click',function(){state.showRefs=!state.showRefs;render();});
    var rtabs=document.querySelectorAll('.route-tab-btn');
    for(var ri=0;ri<rtabs.length;ri++){
      (function(btn){
        btn.addEventListener('click',function(){
          var nr=btn.dataset.route;
          var cr=getCR(state.drug.name,nr);
          state.selectedRoute=nr;
          state.conc=String(cr?cr.c:state.drug.conc);
          state.concLabel=cr?cr.l:'';
          render();
        });
      })(rtabs[ri]);
    }
    el=document.getElementById('btn-go-feedback-res');
    if(el) el.addEventListener('click',function(){
      state.fbType='error';
      state.fbDrug=state.drug?state.drug.name:'';
      state.fbMsg='';state.fbSent=false;state.screen='feedback';render();
    });
  } else if(s==='feedback'){
    el=document.getElementById('btn-back-fb');
    if(el) el.addEventListener('click',function(){state.fbSent=false;state.screen='home';render();});
    el=document.getElementById('btn-back-fb2');
    if(el) el.addEventListener('click',function(){state.fbSent=false;state.screen='home';render();});
    var fbtbs=document.querySelectorAll('.fbtb-btn');
    for(var fi=0;fi<fbtbs.length;fi++){
      (function(btn){
        btn.addEventListener('click',function(){state.fbType=btn.dataset.type;state.fbMsg='';render();});
      })(fbtbs[fi]);
    }
    el=document.getElementById('fb-drug');
    if(el) el.addEventListener('change',function(e){state.fbDrug=e.target.value;});
    el=document.getElementById('fb-msg');
    if(el) el.addEventListener('input',function(e){state.fbMsg=e.target.value;});
    el=document.getElementById('btn-fb-send');
    if(el) el.addEventListener('click',function(){
      var msgEl=document.getElementById('fb-msg');
      var msg=msgEl?msgEl.value:'';
      if(!msg.trim()){alert('Please enter your feedback before sending.');return;}
      var drugEl=document.getElementById('fb-drug');
      var drug=drugEl?drugEl.value:'';
      var typeLabel=state.fbType==='error'?'Drug Error Report':state.fbType==='missing'?'Missing Drug Request':'General Suggestion';
      var drugLine=drug?('Drug: '+drug+'\n'):'';
      var body=encodeURIComponent('PedsCalc Feedback\nType: '+typeLabel+'\n'+drugLine+'\n'+msg+'\n\n- Sent from PedsCalc v1.2');
      var subject=encodeURIComponent('PedsCalc - '+typeLabel);
      window.location.href='mailto:rassadi222@gmail.com?subject='+subject+'&body='+body;
      state.fbSent=true;render();
    });
  }
}

// Security
(function(){
  function _h(s){var h=5381;for(var i=0;i<s.length;i++){h=((h<<5)+h)+s.charCodeAt(i);h=h&h;}return(h>>>0).toString(16);}
  var _ik=_h(JSON.stringify(DRUGS));
  setInterval(function(){
    try{
      if(_h(JSON.stringify(DRUGS))!==_ik){
        document.body.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff0f0;padding:2rem;text-align:center"><div><div style="font-size:48px;margin-bottom:1rem">&#9888;</div><h2 style="color:#8b1a1a;font-size:20px;margin-bottom:.75rem">Data Integrity Error</h2><p style="color:#8b1a1a;font-size:14px;line-height:1.7">Drug data has been modified.<br>Please re-download from a verified source.</p><p style="font-size:12px;color:#aaa;margin-top:1rem">&#169; Saeed Al Rassadi</p></div></div>';
      }
    }catch(e){}
  },3000);
  document.addEventListener('contextmenu',function(e){e.preventDefault();});
  document.addEventListener('keydown',function(e){
    if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(['I','J','C','K'].indexOf(e.key.toUpperCase())>=0))||(e.metaKey&&e.altKey&&(['I','J','C'].indexOf(e.key.toUpperCase())>=0))||(e.ctrlKey&&e.key.toUpperCase()==='U')){
      e.preventDefault();
    }
  });
})();

render();
</script>
